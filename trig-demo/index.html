<div class="trig-demo-container">
  <h3>Interactive Trigonometry Demo</h3>
  
  <!-- Control Slider -->
  <div class="control-panel">
    <label for="angleSlider">Angle (θ): <span id="angleValue">30</span>°</label>
    <input type="range" id="angleSlider" min="1" max="89" value="30" step="1">
  </div>

  <!-- Workspace -->
  <div class="demo-workspace">
    <!-- Visual Triangle Area -->
    <svg id="triangleSvg" width="300" height="250" viewBox="0 0 300 250">
      <!-- Grid Background -->
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" />
      
      <!-- Right Angle Square Indicator -->
      <path id="rightAngleMark" d="M 230 200 L 230 190 L 240 190" fill="none" stroke="#999" stroke-width="2"/>
      
      <!-- Triangle Path -->
      <polygon id="triangle" points="" fill="rgba(52, 152, 219, 0.2)" stroke="#34495e" stroke-width="3" />
      
      <!-- Text Labels -->
      <text id="lblHypotenuse" fill="#e74c3c" font-weight="bold" text-anchor="middle">Hypotenuse</text>
      <text id="lblOpposite" fill="#2ecc71" font-weight="bold" text-anchor="start">Opposite</text>
      <text id="lblAdjacent" fill="#9b59b6" font-weight="bold" text-anchor="middle">Adjacent</text>
      <text id="lblTheta" fill="#34495e" font-weight="bold" font-size="14">θ</text>
    </svg>

    <!-- Real-time Math Display -->
    <div class="math-results">
      <h4>Trigonometric Ratios</h4>
      <p><span class="label hyp">Hypotenuse (c):</span> <span id="valHyp">0.00</span></p>
      <p><span class="label opp">Opposite (a):</span> <span id="valOpp">0.00</span></p>
      <p><span class="label adj">Adjacent (b):</span> <span id="valAdj">0.00</span></p>
      <hr>
      <p><strong>sin(θ)</strong> = Opp / Hyp = <span id="ratioSin">0.00</span></p>
      <p><strong>cos(θ)</strong> = Adj / Hyp = <span id="ratioCos">0.00</span></p>
      <p><strong>tan(θ)</strong> = Opp / Adj = <span id="ratioTan">0.00</span></p>
    </div>
  </div>
</div>

<style>
.trig-demo-container {
  font-family: system-ui, -apple-system, sans-serif;
  max-width: 650px;
  margin: 20px auto;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}
.control-panel {
  margin-bottom: 20px;
  background: #f8f9fa;
  padding: 12px;
  border-radius: 6px;
}
.control-panel input {
  width: 100%;
  margin-top: 8px;
}
.demo-workspace {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}
#triangleSvg {
  border: 1px solid #eee;
  background: #fafafa;
  border-radius: 6px;
  flex: 1 1 280px;
}
.math-results {
  flex: 1 1 240px;
  background: #fdfdfd;
  padding: 15px;
  border-left: 4px solid #34495e;
}
.math-results h4 { margin-top: 0; }
.math-results p { margin: 8px 0; font-family: monospace; font-size: 14px; }
.label { font-weight: bold; }
.hyp { color: #e74c3c; }
.opp { color: #2ecc71; }
.adj { color: #9b59b6; }
</style>

<script>
(function() {
  const slider = document.getElementById('angleSlider');
  const angleValue = document.getElementById('angleValue');
  const triangle = document.getElementById('triangle');
  
  // SVG Text Element Selectors
  const lblHyp = document.getElementById('lblHypotenuse');
  const lblOpp = document.getElementById('lblOpposite');
  const lblAdj = document.getElementById('lblAdjacent');
  const lblTheta = document.getElementById('lblTheta');

  // Value Display Selectors
  const valHyp = document.getElementById('valHyp');
  const valOpp = document.getElementById('valOpp');
  const valAdj = document.getElementById('valAdj');
  const ratioSin = document.getElementById('ratioSin');
  const ratioCos = document.getElementById('ratioCos');
  const ratioTan = document.getElementById('ratioTan');

  // Fixed Anchor Point for Right Angle: (240, 200)
  const bx = 240; 
  const by = 200;
  const hypLength = 180; // Fixed radius for the hypotenuse sweep

  function updateDemo() {
    const degrees = parseInt(slider.value);
    angleValue.textContent = degrees;
    
    const radians = degrees * (Math.PI / 180);

    // Calculate dynamic length of sides based on angle and hypotenuse length
    const oppositeSide = hypLength * Math.sin(radians);
    const adjacentSide = hypLength * Math.cos(radians);

    // Coordinate Math for Triangle Nodes
    const rightAngleX = bx;
    const rightAngleY = by;
    const thetaX = bx - adjacentSide;
    const thetaY = by;
    const topX = bx;
    const topY = by - oppositeSide;

    // Redraw Triangle Polygon
    triangle.setAttribute('points', `${thetaX},${thetaY} ${rightAngleX},${rightAngleY} ${topX},${topY}`);

    // Update Text Outputs
    valHyp.textContent = hypLength.toFixed(0);
    valOpp.textContent = oppositeSide.toFixed(0);
    valAdj.textContent = adjacentSide.toFixed(0);

    ratioSin.textContent = Math.sin(radians).toFixed(3);
    ratioCos.textContent = Math.cos(radians).toFixed(3);
    ratioTan.textContent = Math.tan(radians).toFixed(3);

    // Dynamically position visual labels next to matching sides
    lblHyp.setAttribute('x', (thetaX + topX) / 2 - 15);
    lblHyp.setAttribute('y', (thetaY + topY) / 2 - 15);
    
    lblOpp.setAttribute('x', rightAngleX + 10);
    lblOpp.setAttribute('y', (topY + rightAngleY) / 2);

    lblAdj.setAttribute('x', (thetaX + rightAngleX) / 2);
    lblAdj.setAttribute('y', rightAngleY + 20);

    lblTheta.setAttribute('x', thetaX + 25);
    lblTheta.setAttribute('y', thetaY - 8);
  }

  slider.addEventListener('input', updateDemo);
  updateDemo(); // Run initially on script mount
})();
</script>
